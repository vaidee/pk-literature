name: Terraform Plan

# spec-12-cicd.md — PR pipeline: fmt/validate/plan only, never apply.
#
# Single-environment posture: this repo only stands up one real AWS
# environment ("prod" — terraform/environments/prod), not the
# dev/qa/prod split terraform/environments/{dev,qa} were originally
# scaffolded for. Those two directories are left in place (harmless,
# useful if multi-environment is ever revisited) but CI never plans or
# applies them — this workflow is hardcoded to prod rather than
# matrixing over whichever environment a PR happens to touch.

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/modules/**"
      - "terraform/environments/prod/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write # OIDC — no long-lived AWS keys, infrastructure/iam.md
  contents: read
  pull-requests: write # to comment the plan output on the PR

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every environments/prod/*.tf file reads its own service's
      # deployment package hash via filebase64sha256() — that's
      # evaluated during `plan`, not just `apply`, so every package
      # must exist before terraform runs at all, same as
      # terraform-apply.yml.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build api-catalog Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-catalog
      - name: Build api-publisher-import Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-publisher-import
      - name: Build api-feed Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-feed
      - name: Build api-search Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-search
      - name: Build api-commerce Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-commerce
      - name: Build api-identity Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-identity
      - name: Build apps/web OpenNext packages
        run: bash scripts/package-opennext.sh
        working-directory: apps/web

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive terraform/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ap-south-1

      - name: terraform init
        working-directory: terraform/environments/prod
        run: terraform init -input=false

      - name: terraform validate
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: terraform plan
        working-directory: terraform/environments/prod
        run: terraform plan -input=false -out=tfplan

      # Deliberately no `terraform apply` here — see terraform-apply.yml,
      # which only runs after merge to main.
