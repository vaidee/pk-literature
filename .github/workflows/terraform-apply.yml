name: Deploy

# spec-12-cicd.md — apply pipeline.
#
# GATED, MANUAL-TRIGGER ONLY: this workflow does NOT run on push/merge
# to main. Merging a PR that touches terraform/ never applies anything
# by itself — someone must explicitly go to the Actions tab and run
# this workflow (workflow_dispatch). This is deliberate and is the
# primary gate: it doesn't depend on a GitHub Environment protection
# rule being configured correctly (see the note below on why that
# alone isn't trustworthy).
#
# qa and prod are commented out for now — dev only, per explicit
# instruction. Uncomment the "qa" and "prod" blocks below (and fix up
# the `needs:` chain — see the comments in place) when ready to
# promote beyond dev.
#
# Defense in depth: each job also sets `environment: <env>`, which if
# you ADDITIONALLY configure required reviewers on that GitHub
# Environment (Settings > Environments), adds a second approval layer
# on top of the manual trigger. That configuration is optional here
# specifically because workflow_dispatch is already the primary gate —
# but do configure it before ever re-enabling qa/prod, since a second
# person approving a prod change independently of whoever clicked
# "Run workflow" is worth having.
#
# App deploy steps (OpenNext / ECS) beyond api-catalog are still TODOs.
# api-catalog builds its own deployment package (pnpm build + pnpm
# deploy + zip — see apps/api-catalog/scripts/package-lambda.sh) as a
# step before `terraform apply`, since terraform/environments/*/
# api-catalog.tf reads that zip's hash directly via filebase64sha256().

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply. Only 'dev' is wired up right now — qa/prod jobs are commented out below."
        required: true
        type: choice
        options:
          - dev
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  apply-dev:
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build api-catalog Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-catalog
      - name: Build api-publisher-import Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-publisher-import
      - name: Build api-feed Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-feed
      - name: Build api-search Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-search
      - name: Build api-commerce Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-commerce
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ap-south-1
      - working-directory: terraform/environments/dev
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve
      # TODO(phase-2+): deploy OpenNext here, per SPEC-12. Directus/
      # Medusa images are NOT built/deployed by this workflow at all —
      # those are gated, manual-trigger-only workflows
      # (build-directus-image.yml/build-medusa-image.yml), run
      # separately before bumping directus_image_tag/medusa_image_tag
      # and re-running this workflow to roll the new tag out.

  smoke-test-dev:
    needs: apply-dev
    runs-on: ubuntu-latest
    steps:
      - run: echo "TODO(phase-1+) — no application endpoints exist yet to smoke-test. This job is a placeholder so the pipeline shape (development/testing.md's E2E layer) is already wired for when apps/web + a Lambda exist."

  # --- qa and prod: commented out, dev only for now ---
