name: Deploy

# spec-12-cicd.md — apply pipeline.
#
# Single-environment posture: this repo only stands up one real AWS
# environment ("prod" — terraform/environments/prod). The dev/qa
# directories terraform/environments/{dev,qa} were originally
# scaffolded for a three-environment split are left in place but are no
# longer wired into CI at all — see terraform-plan.yml's header for the
# same note. (The commented-out dev/qa apply jobs this workflow used to
# carry as a "how to re-enable" reference are gone too; pull them back
# out of git history/PR #12's predecessor if multi-environment is ever
# revisited — they're not worth the ongoing dead-code weight for a
# single-environment setup.)
#
# TRIGGER: runs automatically on every push to main that touches
# Terraform-relevant paths (i.e. once a PR merges) — no more manual
# workflow_dispatch-only gate. The safety net instead is the
# `environment: prod` below PLUS a required-reviewers rule configured
# on that GitHub Environment (Settings > Environments > prod > "Required
# reviewers") — GitHub pauses the job for manual approval before it runs
# anything. That reviewer rule can only be configured in the repo's
# Settings UI/API, not from this file — set it before merging anything
# that would touch prod infrastructure, or this "manual approval gate"
# doesn't actually exist yet.
#
# workflow_dispatch is kept as a manual fallback (e.g. re-running an
# apply with no new commit, such as after bumping directus_image_tag/
# medusa_image_tag by hand) — it goes through the same approval gate.
#
# App deploy steps beyond api-catalog: apps/web's OpenNext packages are
# built here (scripts/package-opennext.sh) and, after `terraform apply`
# creates/updates the S3 bucket + CloudFront distribution, the built
# .open-next/assets get synced to that bucket and the distribution
# invalidated — see the last two steps below. Directus/Medusa images
# are NOT built/deployed by this workflow at all — those are gated,
# manual-trigger-only workflows (build-directus-image.yml/
# build-medusa-image.yml), run separately before bumping
# directus_image_tag/medusa_image_tag and re-running this workflow to
# roll the new tag out.

on:
  push:
    branches:
      - main
    paths:
      - "terraform/modules/**"
      - "terraform/environments/prod/**"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build api-catalog Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-catalog
      - name: Build api-publisher-import Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-publisher-import
      - name: Build api-feed Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-feed
      - name: Build api-search Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-search
      - name: Build api-commerce Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-commerce
      - name: Build api-identity Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/api-identity
      - name: Build migration-runner Lambda package
        run: bash scripts/package-lambda.sh
        working-directory: apps/migration-runner
      - name: Build apps/web OpenNext packages
        run: bash scripts/package-opennext.sh
        working-directory: apps/web
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ap-southeast-1
      - working-directory: terraform/environments/prod
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve
      - name: Sync OpenNext static assets to S3
        working-directory: terraform/environments/prod
        run: |
          BUCKET=$(terraform output -raw web_static_assets_bucket_id)
          ASSETS_DIR="../../../apps/web/.open-next/assets"
          # _next/static/* is content-hashed by Next.js itself (a build
          # producing different output gets a different filename), so it's
          # safe to cache forever — everything else (the copied public/
          # directory, plus any non-hashed _next output) isn't, and should
          # revalidate on every request instead.
          aws s3 sync "$ASSETS_DIR" "s3://$BUCKET" \
            --delete \
            --exclude "_next/static/*" \
            --cache-control "public,max-age=0,must-revalidate"
          if [ -d "$ASSETS_DIR/_next/static" ]; then
            aws s3 sync "$ASSETS_DIR/_next/static" "s3://$BUCKET/_next/static" \
              --delete \
              --cache-control "public,max-age=31536000,immutable"
          fi
      - name: Invalidate apps/web CloudFront distribution
        working-directory: terraform/environments/prod
        run: |
          DIST_ID=$(terraform output -raw web_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

  smoke-test:
    needs: apply
    runs-on: ubuntu-latest
    steps:
      - run: echo "TODO(phase-1+) — no automated smoke test exists yet. This job is a placeholder so the pipeline shape (development/testing.md's E2E layer) is already wired for when one does."
