# Local dev only — never used in deployed environments (those use RDS +
# RDS Proxy, infrastructure/networking.md). Matches the RDS engine
# version in terraform/modules/rds (postgres 16) so migrations behave
# the same locally as in dev/qa/prod.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pk_literature
      POSTGRES_PASSWORD: pk_literature_local_dev
      POSTGRES_DB: pk_literature
    ports:
      - "5432:5432"
    volumes:
      - pk_literature_postgres_data:/var/lib/postgresql/data

volumes:
  pk_literature_postgres_data:
